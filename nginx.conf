# /etc/nginx/sites-available/quantumhub.me
# Astro static site — serve dist/ folder

server {
    listen 80;
    listen [::]:80;
    server_name quantumhub.me www.quantumhub.me;

    # Redirect HTTP → HTTPS (Certbot will fill this in)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name quantumhub.me www.quantumhub.me;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/quantumhub.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quantumhub.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www → apex
    if ($host = www.quantumhub.me) {
        return 301 https://quantumhub.me$request_uri;
    }

    root /var/www/quantumhub/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy    "camera=(), microphone=(), geolocation=()" always;

    # Cache static assets aggressively
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|jpeg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML — short cache, always revalidate
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # SPA-style fallback (Astro static builds use 404.html)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
